[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter=@taula/api build"

[deploy]
startCommand = "pnpm --filter=@taula/api exec prisma migrate deploy && pnpm --filter=@taula/api start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
